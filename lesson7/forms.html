<!DOCTYPE html>
<html>
<head>  
<title>forms</title>
</head>
<body>
	<form>
		<fieldset>
 		<legend>Login</legend>
		<label for="firstName">First name</label><br />
		<input type="text"name="firstName"id="firstName" value="Anise" readonly /><br/>

		<label for=lastName>LastName</label><br />
		<input type="text"name="Lastname" id="lastname" disabled /><br />

		<label for="email">email </label><br/>
		<input type="email"name="email" id="email" required /><br/>

		<label for="pasword">pasword</label><br/>
		<input type="pasword"name="pasword" id="pasword"size="40"placeholder="your pasword" /><br/>

		<label>Gender</label> <br>
		<input type="radio" name="female" id="female" value="female"/>
		<label for="female" >female</label><br />

		<input type="radio" name="gender" id="male"  value="male"/>
		<label for="male" >male </label><br  />

		<label>hobbies</label><br />
		<input type="checkbox" name="gaming"id="gaming" value="gaming"/>
		<label for="gaming" >Gaming</label><br />

		<input type="checkbox" name="reading" id="reading" value="reading"/>
		<label for="reading">Reading</label> <br/>

		<input type="checkbox" name="football" id="football" value="football">
		<label for="football" > Football</label><br />

		<label for="pets">Chosse a pet;</label>
		<select name=pets id="pets">
		<option value="dog"> Dog</option>
		<option value="cat"> Cat</option>
		<option value="hamster"> Hamster</option>
	</select><br>
	<textarea name="message" id="message rows="10" cols"20"></textarea><br />



		<input type="submit"value="submit"/>
		</fieldset>
	</form>
</body>
</html>
